        function createGameCard(game) {
            var portrait = 'https://cdn.cloudflare.steamstatic.com/steam/apps/' + game.appid + '/library_600x900.jpg';
            var landscape = 'https://cdn.cloudflare.steamstatic.com/steam/apps/' + game.appid + '/header.jpg';
            var steamURL = 'https://store.steampowered.com/app/' + game.appid + '/';

            var storeButtons =
                (game.official ? '<a href="' + game.official + '" target="_blank" rel="noopener" class="game-link link-official">🌐 Web Oficial</a>' : '') +
                '<a href="' + steamURL + '" target="_blank" rel="noopener" class="game-link link-steam">🟦 Steam</a>' +
                (game.gog    ? '<a href="' + game.gog  + '" target="_blank" rel="noopener" class="game-link link-gog">🟣 GOG</a>' : '') +
                (game.xbox   ? '<a href="' + game.xbox + '" target="_blank" rel="noopener" class="game-link link-xbox">🟢 Xbox</a>' : '') +
                (game.epic   ? '<a href="' + game.epic + '" target="_blank" rel="noopener" class="game-link link-epic">⬛ Epic</a>' : '');

            return '<div class="game-card">' +
                '<div class="game-cover-container">' +
                '<img src="' + portrait + '" alt="' + game.title + '" class="game-cover" data-fallback1="' + landscape + '" loading="lazy" onerror="handleImageError(this)">' +
                '</div>' +
                '<div class="game-info">' +
                '<h3 class="game-title">' + game.title + '</h3>' +
                '<div class="game-meta">' +
                '<span class="meta-tag year">📅 ' + game.year + '</span>' +
                '<span class="meta-tag rating">🎮 ' + game.esrb + '</span>' +
                '<span class="meta-tag developer">👾 ' + game.dev + '</span>' +
                '</div>' +
                '<p class="game-description">' + game.note + '</p>' +
                '<div class="game-links-media">' +
                '<a href="' + game.trailer  + '" target="_blank" rel="noopener" class="game-link link-trailer">🎥 Trailer</a>' +
                '<a href="' + game.gameplay + '" target="_blank" rel="noopener" class="game-link link-gameplay">🎮 Gameplay</a>' +
                '</div>' +
                '<div class="game-links-stores">' + storeButtons + '</div>' +
                '</div>' +
                '</div>';
        }

        function render() {
            var q = document.getElementById('search').value.toLowerCase();
            var f = document.getElementById('filter').value;
            var data = games.filter(function(g) {
                return g.title.toLowerCase().indexOf(q) !== -1 || g.note.toLowerCase().indexOf(q) !== -1;
            }).filter(function(g) {
                return !f || g.esrb === f;
            });
            var grid = document.getElementById('gamesGrid');
            if (data.length === 0) {
                grid.innerHTML = '<div class="no-results">🔍 No se encontraron juegos con esos filtros.</div>';
            } else {
                grid.innerHTML = data.map(function(g) { return createGameCard(g); }).join('');
            }
        }

        document.getElementById('search').oninput = render;
        document.getElementById('filter').onchange = render;
        document.querySelectorAll('.age-badge').forEach(function(badge) {
            badge.onclick = function() {
                document.querySelectorAll('.age-badge').forEach(function(b) { b.classList.remove('active'); });
                this.classList.add('active');
                document.getElementById('filter').value = this.dataset.filter;
                render();
            };
        });
        render();
    </script>
